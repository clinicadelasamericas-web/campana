<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes de Mamá – Clínica de las Américas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --azul-oscuro: #0F4C5C; /* Pantone 7708 C */
  --celeste: #4CC9F0;     /* Pantone 631 C */
  --naranja: #F77F00;     /* Pantone 151 C */
  --blanco: #ffffff;
  --gris: #f5f5f5;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--gris);
  color: var(--azul-oscuro);
}

/* HEADER */
.site-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo-area img {
  height:60px;
}

/* BOTONES */
.tab-btn {
  padding:10px 20px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-weight:700;
  background: var(--celeste);
  color: var(--azul-oscuro);
}

.tab-btn.active {
  background: var(--azul-oscuro);
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
}

.hero-title {
  font-size:50px;
  color: var(--azul-oscuro);
}

.hero-title em {
  color: var(--naranja);
}

/* CARDS */
.card {
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* PRECIOS */
.price {
  color: var(--naranja);
  font-weight:bold;
}

/* SECCIONES */
.panel { display:none; }
.panel.active { display:block; }

.section-title {
  color: var(--azul-oscuro);
  font-weight:700;
  margin-bottom:15px;
}

/* BOTONES CTA */
.btn {
  background: var(--naranja);
  color:white;
  padding:10px 20px;
  border-radius:20px;
  text-decoration:none;
  display:inline-block;
}

.btn:hover {
  background: var(--azul-oscuro);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

</style>
</head>

<body>

<header class="site-header">
  <div class="logo-area">
    <img src="logo.png" alt="Clínica de las Américas">
  </div>
  <div style="color:var(--azul-oscuro); font-weight:bold;">
    Mayo 2026
  </div>
</header>

<section class="hero">
  <h1 class="hero-title">Mes <em>de</em> Mamá</h1>
  <p>Promociones especiales durante todo el mes</p>
</section>

<!-- BOTONES -->
<div style="text-align:center; margin-bottom:20px;">
  <button class="tab-btn active" onclick="showPanel('consultorio', this)">Consultorio</button>
  <button class="tab-btn" onclick="showPanel('laboratorios', this)">Laboratorios</button>
  <button class="tab-btn" onclick="showPanel('paquetes', this)">Paquetes</button>
</div>

<!-- CONSULTORIO -->
<div id="panel-consultorio" class="panel active">
  <div class="card">
    <h3 class="section-title">Consulta Ginecológica</h3>
    <p>Atención especializada</p>
    <p class="price">Bs. 150</p>
  </div>
</div>

<!-- LABORATORIOS -->
<div id="panel-laboratorios" class="panel">
  <div class="grid">
    <div class="card">T3 Total <span class="price">108.50</span></div>
    <div class="card">T4 Total <span class="price">68.60</span></div>
    <div class="card">TSH <span class="price">95.90</span></div>
  </div>
</div>

<!-- PAQUETES -->
<div id="panel-paquetes" class="panel">
  <div class="grid">
    <div class="card">
      <h3>Paquete 1</h3>
      <p class="price">Bs. 462</p>
    </div>
    <div class="card">
      <h3>Paquete 2</h3>
      <p class="price">Bs. 462</p>
    </div>
  </div>
</div>

<script>
function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>

</body>
</html>
